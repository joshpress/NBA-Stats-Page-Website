<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/icon.png" type="image/x-icon">
  <title>NBA Stats Page</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="script.js"></script>
</head>

<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="player_compare.html">Compare Players</a></li>
    </ul>
  </nav>
  <h1>NBA Player Stats</h1>

  <form>
    <h2>Get the stats about your favorite NBA Basketball Players from 2004!</h2><br>
    <div id="imgDiv">
      <img alt="Stephen Curry attempting to score a field goal at the 2022 NBA All-Star Game" src="/images/home-image.jpg">
    </div>
    <div class="PlayerStats">
      <label for="playerName">Team/Player Name:</label>
     <label for="searchInput">Team/Player Name:</label>
     <input type="text" id="searchInput" name="playerName" list="searchSuggestions" autocomplete="off" required>
     <datalist id="searchSuggestions"></datalist>
      <label for="year">Year</label>
      <input type="number" id="year" min="2004" value="2004" max="2025">
      <p id="searchMessage"></p>
      <button id="submitPlayer" type="button">Get Stats</button><br>
    </div>

  </form>



  <table id="statsTable">
    <thead>
      <tr id="headerRow"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="liveGames"></div>

</body>
