<head>
  <title>NBA Stats Page</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js"></script>
</head>

<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="player_compare.html">Compare Players</a></li>
    </ul>
  </nav>
  <h1>NBA Player Stats</h1>

  <form>
    <p>Get the stats about your favorite NBA Basketball Players from 2004!</p>
    <div id="PlayerStats">

      <label for="playerName">Team/Player Name:</label><br>
      <input type="text" id="searchInput" name="playerName" required><br>
      <label for ="year">Year</label>
      <input type="number" id="year" min="2004" value ="2004" max="2026">

    </div>
    <button id="submitPlayer" type="button">Get Stats</button>
  </form>
  <p id="searchMessage"></p>

  
  <table id="statsTable">
    <thead>
      <tr id="headerRow"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="liveGames"></div>

</body>
